<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: Deep Blueprint Blue -->
  <rect width="100" height="100" fill="#003366"/>
  
  <!-- Grid System -->
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="white" stroke-width="0.2" stroke-opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#grid)"/>
  
  <!-- Blueprint Technical Markings -->
  <g stroke="white" stroke-width="0.5" stroke-opacity="0.6">
    <line x1="15" y1="15" x2="25" y2="15"/>
    <line x1="15" y1="15" x2="15" y2="25"/>
    <line x1="85" y1="85" x2="75" y2="85"/>
    <line x1="85" y1="85" x2="85" y2="75"/>
  </g>

  <!-- Main Science Icon: Stylized Erlenmeyer Flask -->
  <g fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flask Body -->
    <path d="M42 20 L42 45 L25 80 L75 80 L58 45 L58 20"/>
    <!-- Flask Rim -->
    <path d="M38 20 L62 20"/>
    <!-- Liquid Level Line -->
    <line x1="31" y1="68" x2="69" y2="68" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Dimension Lines -->
  <g stroke="white" stroke-width="0.8">
    <!-- Vertical Height Marker -->
    <line x1="88" y1="20" x2="88" y2="80"/>
    <line x1="86" y1="20" x2="90" y2="20"/>
    <line x1="86" y1="80" x2="90" y2="80"/>
    
    <!-- Horizontal Width Marker -->
    <line x1="25" y1="90" x2="75" y2="90"/>
    <line x1="25" y1="88" x2="25" y2="92"/>
    <line x1="75" y1="88" x2="75" y2="92"/>
  </g>

  <!-- Vertex Points (Blueprint Accents) -->
  <g fill="white">
    <circle cx="42" cy="45" r="1.2"/>
    <circle cx="58" cy="45" r="1.2"/>
    <circle cx="25" cy="80" r="1.2"/>
    <circle cx="75" cy="80" r="1.2"/>
  </g>
</svg>