<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a120b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scanlinePattern" width="100" height="2" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#000" fill-opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Outer Bezel -->
  <rect width="100" height="100" rx="10" fill="#1a120b"/>
  
  <!-- Screen Background -->
  <rect x="8" y="8" width="84" height="84" rx="4" fill="#0d0804"/>
  
  <!-- Amber Glow -->
  <rect x="8" y="8" width="84" height="84" rx="4" fill="url(#screenGlow)"/>
  
  <!-- Terminal Cursor Shape -->
  <rect x="16" y="18" width="12" height="18" fill="#ffb000">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Scanlines Overlay -->
  <rect x="8" y="8" width="84" height="84" rx="4" fill="url(#scanlinePattern)" pointer-events="none"/>
  
  <!-- Screen Frame Highlight -->
  <rect x="8" y="8" width="84" height="84" rx="4" fill="none" stroke="#ffb000" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>