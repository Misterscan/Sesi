<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#141a29" />
    </linearGradient>

    <!-- Window Gradient -->
    <linearGradient id="window-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Glass Card Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing Borders -->
    <linearGradient id="glow-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Filters -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.65" />
    </filter>

    <filter id="badge-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08" />

  <!-- Background grid pattern -->
  <g opacity="0.04">
    <path d="M0 64 H512 M0 128 H512 M0 192 H512 M0 256 H512 M0 320 H512 M0 384 H512 M0 448 H512" stroke="#ffffff" stroke-width="1.5" />
    <path d="M64 0 V512 M128 0 V512 M192 0 V512 M256 0 V512 M320 0 V512 M384 0 V512 M448 0 V512" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- EDITOR WINDOW (CHTML Code Pane) -->
  <g transform="translate(48, 56)" filter="url(#drop-shadow)">
    <!-- Window Outer frame -->
    <rect width="416" height="384" rx="24" fill="url(#window-grad)" stroke="#1e293b" stroke-width="2.5" />

    <!-- Window top navigation dot controls -->
    <circle cx="28" cy="24" r="6" fill="#ff5f56" />
    <circle cx="48" cy="24" r="6" fill="#ffbd2e" />
    <circle cx="68" cy="24" r="6" fill="#27c93f" />

    <!-- Tabs border line -->
    <line x1="0" y1="48" x2="416" y2="48" stroke="#1e293b" stroke-width="2" />

    <!-- Tab title -->
    <rect x="96" y="16" width="60" height="12" rx="4" fill="#38bdf8" fill-opacity="0.1" />
    <path d="M 106 22 H 146" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />

    <!-- Code Block -->
    <g transform="translate(18, 64)">
      <!-- Line 1: document language="en" { -->
      <rect x="10" y="8" width="70" height="12" rx="6" fill="#f97316" /> <!-- document -->
      <rect x="86" y="8" width="55" height="12" rx="6" fill="#38bdf8" /> <!-- language -->
      <rect x="147" y="8" width="30" height="12" rx="6" fill="#34d399" /> <!-- "en" -->
      <rect x="183" y="8" width="12" height="12" rx="4" fill="#94a3b8" /> <!-- { -->

      <!-- Line 2:   metadata { -->
      <rect x="25" y="32" width="60" height="12" rx="6" fill="#f97316" /> <!-- metadata -->
      <rect x="91" y="32" width="12" height="12" rx="4" fill="#94a3b8" /> <!-- { -->

      <!-- Line 3:     page-title "My Page" -->
      <rect x="40" y="56" width="65" height="12" rx="6" fill="#818cf8" /> <!-- page-title -->
      <rect x="111" y="56" width="55" height="12" rx="6" fill="#34d399" /> <!-- "My Page" -->

      <!-- Line 4:   } -->
      <rect x="25" y="80" width="12" height="12" rx="4" fill="#94a3b8" opacity="0.8" />

      <!-- Line 5:   page { -->
      <rect x="25" y="104" width="40" height="12" rx="6" fill="#f97316" /> <!-- page -->
      <rect x="71" y="104" width="12" height="12" rx="4" fill="#94a3b8" />

      <!-- Line 6:     link to="/about" "About" (Active Hover State) -->
      <g transform="translate(30, 122)">
        <!-- Hover highlight box -->
        <rect x="0" y="0" width="220" height="28" rx="8" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 2" />
        <rect x="8" y="8" width="30" height="12" rx="6" fill="#f97316" /> <!-- link -->
        <rect x="43" y="8" width="16" height="12" rx="6" fill="#38bdf8" /> <!-- to -->
        <rect x="64" y="8" width="55" height="12" rx="6" fill="#34d399" /> <!-- "/about" -->
        <rect x="124" y="8" width="45" height="12" rx="6" fill="#34d399" /> <!-- "About" -->
      </g>

      <!-- Line 7:     paragraph "Welcome" -->
      <rect x="40" y="160" width="75" height="12" rx="6" fill="#f97316" opacity="0.8" />
      <rect x="121" y="160" width="50" height="12" rx="6" fill="#34d399" opacity="0.8" />

      <!-- Line 8:   } -->
      <rect x="25" y="184" width="12" height="12" rx="4" fill="#94a3b8" opacity="0.7" />

      <!-- Line 9: } -->
      <rect x="10" y="208" width="12" height="12" rx="4" fill="#94a3b8" opacity="0.7" />
    </g>
  </g>

  <!-- NAVIGATION DOTTED LINE FROM LINK TO CARD -->
  <path d="M 180 260 C 180 330, 210 370, 290 330" fill="none" stroke="url(#accent-glow)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4" opacity="0.85" />

  <!-- PREMIUM HOVER DOCUMENTATION CARD -->
  <g transform="translate(184, 196)" filter="url(#drop-shadow)">
    <!-- Glowing outer border backplate -->
    <rect width="280" height="210" rx="20" fill="url(#glow-border)" opacity="0.9" filter="url(#badge-glow)" />
    <!-- Glass body -->
    <rect x="3" y="3" width="274" height="204" rx="17" fill="url(#glass-grad)" />

    <!-- Card Header -->
    <!-- Icon Container -->
    <rect x="16" y="16" width="36" height="36" rx="10" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1.5" />
    <!-- Anchor Link Icon -->
    <path d="M 12 24 C 15 21, 19 25, 16 28 M 24 16 C 21 19, 17 15, 20 12 M 18 20 L 22 16" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(10, 10)" />

    <!-- Badges -->
    <rect x="64" y="18" width="60" height="16" rx="8" fill="#f97316" /> <!-- link -->
    <rect x="130" y="18" width="40" height="16" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1" /> <!-- HTML -->
    <rect x="64" y="40" width="100" height="8" rx="4" fill="#94a3b8" opacity="0.6" /> <!-- ClearHTML Docs -->

    <!-- Divider -->
    <line x1="16" y1="68" x2="264" y2="68" stroke="#334155" stroke-width="1.5" />

    <!-- Simulated Text Content -->
    <rect x="16" y="84" width="248" height="8" rx="4" fill="#e2e8f0" />
    <rect x="16" y="100" width="210" height="8" rx="4" fill="#e2e8f0" />
    <rect x="16" y="116" width="160" height="8" rx="4" fill="#e2e8f0" opacity="0.7" />

    <!-- Interactive Navigation Target Panel -->
    <g transform="translate(16, 136)">
      <rect width="248" height="48" rx="10" fill="#090d16" stroke="#334155" stroke-width="1" />
      <!-- Document icon -->
      <rect x="12" y="12" width="24" height="24" rx="6" fill="#34d399" fill-opacity="0.15" />
      <path d="M 21 21 H 27 M 21 25 H 27 M 21 29 H 25" stroke="#34d399" stroke-width="2" stroke-linecap="round" transform="translate(1, -1)" />

      <!-- Destination details -->
      <rect x="48" y="15" width="110" height="8" rx="4" fill="#34d399" /> <!-- /about.chtml -->
      <rect x="48" y="27" width="70" height="6" rx="3" fill="#64748b" /> <!-- Follow link -->

      <!-- Go Arrow -->
      <path d="M 220 24 L 228 24 M 224 20 L 228 24 L 224 28" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <!-- INTERACTION CURSOR -->
  <g transform="translate(390, 360)" filter="url(#drop-shadow)">
    <!-- Outer cursor glow -->
    <path d="M 0 0 L 10 28 L 16 18 L 28 24 Z" fill="#38bdf8" opacity="0.3" filter="url(#badge-glow)" />
    <!-- Cursor Body -->
    <path d="M 0 0 L 8 24 L 13 15 L 24 20 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- SUCCESS INDICATOR (Top Right Live Indicator) -->
  <g transform="translate(416, 24)" filter="url(#drop-shadow)">
    <!-- Pulse Ring -->
    <circle cx="20" cy="20" r="20" fill="#10b981" fill-opacity="0.2" />
    <!-- Center Green Badge -->
    <circle cx="20" cy="20" r="14" fill="#10b981" />
    <!-- Tick symbol -->
    <path d="M 14 20 L 18 24 L 26 15" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- CODE BADGE DECORATION (Bottom Left) -->
  <g transform="translate(32, 408)" filter="url(#drop-shadow)">
    <rect width="64" height="40" rx="14" fill="#818cf8" stroke="#6366f1" stroke-width="1.5" />
    <!-- </> Symbol -->
    <path d="M 20 25 L 14 20 L 20 15 M 44 15 L 50 20 L 44 25 M 34 13 L 30 27" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>